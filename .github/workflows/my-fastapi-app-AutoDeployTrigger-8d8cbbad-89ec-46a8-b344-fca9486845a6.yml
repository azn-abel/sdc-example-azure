name: Trigger auto deployment for my-fastapi-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/my-fastapi-app-AutoDeployTrigger-8d8cbbad-89ec-46a8-b344-fca9486845a6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MYFASTAPIAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MYFASTAPIAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MYFASTAPIAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ca22c7421b42acr.azurecr.io
          registryUsername: ${{ secrets.MYFASTAPIAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MYFASTAPIAPP_REGISTRY_PASSWORD }}
          containerAppName: my-fastapi-app
          resourceGroup: sdc-example
          imageToBuild: ca22c7421b42acr.azurecr.io/my-fastapi-app:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


